services:
  backend:
    build: ./backend-universidad
    container_name: puropollo-back
    restart: always
    ports:
      - "3013:3001"
    env_file:
      - ./backend-universidad/.env

  frontend:
    build: ./frontend_universidad
    container_name: puropollo-front
    restart: always
    ports:
      - "3012:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://194.113.64.53:3013
    depends_on:
      - backend
